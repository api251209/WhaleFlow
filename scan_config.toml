# ============================================================
# WhaleFlow 選股策略設定檔
# ============================================================
# 修改後執行以下指令即可套用：
#   poetry run python -m whaleflow scan weekly --save
# ============================================================


[noise]

# 人數雜訊門檻（整數，單位：人）
# 持股 400/800/1000 張以上的股東人數，若該週變動幅度 ≤ 此值，
# 視為雜訊（可能是零股、贈股等非主動買賣），該條件判定為無效。
# 建議範圍：2 ~ 5。數字越大，篩選越嚴格，命中股票越少。
min_holder_delta = 3


[conditions]

# 條件 A ─────────────────────────────────────────────────────
# 400 張以上大戶的持股比例，T 週 > T-3 週（4週淨增加）
# 說明：只比較最新一週（T）與 3 週前（T-3）的持股比例，
#       T 比 T-3 高即視為趨勢向上，中間不要求每週都漲。
# 啟用：true / 停用：false
condition_a_enabled = true
# 得分（滿足此條件時加入總分）
condition_a_score = 3.0

# 回看週數：比較 T 與幾週前的資料
# 例：4 = 比較 T 與 T-3（需 4 週資料）
#     3 = 比較 T 與 T-2（需 3 週資料，條件較寬鬆）
#     5 = 比較 T 與 T-4（需 5 週資料，條件較嚴格）
condition_a_lookback_weeks = 4

# 持股比例門檻：T 比 T-N 至少要增加幾個百分點才算
# 例：0.0 = 只要 T > T-3 即可（任何增加都算）
#     0.5 = T 比 T-3 至少高 0.5 個百分點
condition_a_min_pct_delta = 0.2

# 持股人數門檻：T 比 T-3 至少要增加幾人才算
# 例：3 = T 的 400 張以上人數，比 T-3 至少多 3 人
#     0 = 不限人數變動
condition_a_min_holder_delta = 3

# 條件 B ─────────────────────────────────────────────────────
# 800 張以上大戶的持股總張數，連續 N 週增加
# 說明：持有 800 張以上的更大戶，持股數量是否持續增加，
#       代表資金較大的投資人在加碼。
condition_b_enabled = true
condition_b_score = 2.0

# 連續週數：shares_800 需連續增加幾週才算通過
# 例：2 = 連續 2 週增加（需 3 週資料：T-2, T-1, T）
#     3 = 連續 3 週增加（需 4 週資料：T-3, T-2, T-1, T）
condition_b_consecutive_weeks = 2

# 持股人數門檻：每個區間 800 張以上人數變動需超過幾人才算有意義
# 例：3 = 每週人數變動需 > 3 人
#     0 = 不限人數變動
condition_b_min_holder_delta = 3

# 持股張數門檻：每個區間 800 張以上持股張數，至少要增加幾張才算有意義
# 例：200  = 每週增加需 > 200 張
#     1000 = 每週增加需 > 1000 張（更嚴格）
#     0    = 只要有增加即可（不限張數）
condition_b_min_share_delta = 200

# 條件 C ─────────────────────────────────────────────────────
# 1000 張以上超大戶的人數與持股張數，本週同時增加（T-1 → T）
# 說明：最近一週是否有新的超大戶進場，且持股量也同步增加，
#       是最短期的「大戶突然介入」訊號。
condition_c_enabled = true
condition_c_score = 2.0

# 持股人數門檻：1000 張以上人數增加需超過幾人才算有意義
# 例：3 = 人數增加需 > 3 人
condition_c_min_holder_delta = 3

# 持股張數門檻：1000 張以上持股張數，本週至少要增加幾張才算有意義
# 例：500  = 增加需 > 500 張
#     1000 = 增加需 > 1000 張（更嚴格）
#     0    = 只要有增加即可（不限張數）
condition_c_min_share_delta = 500


[scoring]

# 總分門檻：低於此分數的個股不顯示
# 例：4.0 = 至少要有兩個條件同時通過（A+C=5.5, A+B=5.0, B+C=4.5 皆可；單一條件最高 3.0 不符合）
#     2.0 = 只要任一條件通過即可（等同無門檻）
#     0.0 = 全部顯示
min_total_score = 4.0


[price_filter]

# 週漲幅排除門檻（小數，0.20 = 20%）
# 近一週股價漲幅超過此值的個股會被排除，避免追高。
# 例：0.15 = 排除漲超過 15% 的股票
#     0.30 = 排除漲超過 30% 的股票（放寬標準）
#     1.00 = 實際上不排除任何股票（等同關閉此過濾）
max_weekly_gain = 0.20

# 是否啟用股價過濾（true = 啟用，false = 停用）
# 停用後等同 --no-price-filter，可加快執行速度
enabled = true


[liquidity_filter]

# 近日平均成交量門檻（整數，單位：張）
# 使用掃描當週的 TDCC 週日期（通常為週四或週五）成交量估算。
# 低於此值的個股視為流動性不足，將被排除，避免選到難以進出場的冷門股。
# 例：1000  = 排除日均量 < 1000 張的個股（一般中小型股門檻）
#     500   = 放寬標準，允許較冷門的個股
#     3000  = 嚴格標準，只留大型股
min_avg_daily_volume = 1000

# 是否啟用流動性過濾（true = 啟用，false = 停用）
enabled = true
