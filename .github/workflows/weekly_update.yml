name: 每週資料更新

on:
  schedule:
    - cron: "0 4 * * 6"   # 每週六 04:00 UTC = 台灣時間 12:00
  workflow_dispatch:        # 支援手動觸發（可隨時在 Actions 頁面按 Run workflow）

permissions:
  contents: write           # 允許 commit & push 回 repo

jobs:
  weekly-update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 取得程式碼 ───────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 環境設定 ─────────────────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-in-project: true

      - name: Cache virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('poetry.lock') }}
          restore-keys: venv-${{ runner.os }}-

      - name: Install dependencies
        run: poetry install --no-interaction

      # ── 準備目錄 & DB ────────────────────────────────────────────────────────
      - name: 建立目錄
        run: mkdir -p data reports

      - name: Init DB schema
        run: poetry run python -m whaleflow init

      # ── 資料更新（依序執行）──────────────────────────────────────────────────
      - name: ① 更新股票清單
        run: poetry run python -m whaleflow fetch stocks

      - name: ② 抓取 TDCC 集保資料（OpenAPI）
        run: poetry run python -m whaleflow fetch tdcc-api

      - name: ③ 抓取三大法人整週資料
        run: poetry run python -m whaleflow fetch institutional --week

      - name: ④ 執行選股掃描並儲存 CSV 報告
        run: poetry run python -m whaleflow scan weekly --save
        env:
          FINMIND_API_TOKEN: ${{ secrets.FINMIND_API_TOKEN }}

      # ── Commit & Push ────────────────────────────────────────────────────────
      - name: ⑤ Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/whaleflow.db reports/
          if git diff --staged --quiet; then
            echo "本週無資料異動，跳過 commit。"
          else
            git commit -m "chore: weekly update $(date '+%Y-%m-%d')"
            git push
          fi

      # ── 失敗通知（可選）─────────────────────────────────────────────────────
      - name: 失敗時建立 Issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `❌ 週更新失敗 ${new Date().toISOString().slice(0,10)}`,
              body: `GitHub Actions 週更新任務失敗。\n\n[查看執行記錄](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              labels: ['bug']
            })
